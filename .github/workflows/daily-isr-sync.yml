name: Daily Prediction Model ISR Sync

on:
  schedule:
    # 8:00 AM EDT — morning slate sync + first-pitch ISR window
    - cron: "0 12 * * *"
    # 12:00 PM EDT — midday full refresh before first pitch
    - cron: "0 16 * * *"
    # 4:00 PM EDT — evening slate odds refresh + ISR revalidate
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-isr-sync
  cancel-in-progress: false

jobs:
  sync-and-revalidate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Monorepo Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engines/mlb_engine/requirements.txt

      - name: Install Engine Dependencies
        run: pip install -r engines/mlb_engine/requirements.txt

      - name: Execute Morning Slate Sync (skip props)
        if: github.event.schedule == '0 12 * * *'
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          BASEBALL_PREDICTOR_PATH: engines/mlb_engine/predictor
          BASEBALL_PROPS_PATH: engines/mlb_engine/props
        run: python engines/mlb_engine/scripts/export_daily_picks.py --skip-props

      - name: Execute Full Slate Sync
        if: github.event.schedule == '0 16 * * *' || github.event.schedule == '0 20 * * *' || github.event_name == 'workflow_dispatch'
        env:
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          BASEBALL_PREDICTOR_PATH: engines/mlb_engine/predictor
          BASEBALL_PROPS_PATH: engines/mlb_engine/props
          PROPS_EXPORT_TIMEOUT_SECONDS: "1800"
        run: python engines/mlb_engine/scripts/export_daily_picks.py

      - name: Commit And Push Updated Picks
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/picks/ data/results/
          if git diff --staged --quiet; then
            echo "No pick changes to publish."
          else
            git commit -m "ci: sync daily MLB picks $(date -u +%F)"
            git push
          fi

      - name: Evaluate And Schedule Next First-Pitch Window
        if: github.event.schedule == '0 12 * * *'
        env:
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python engines/mlb_engine/utils/schedule_first_pitch_hook.py

      - name: Revalidate Site Cache (evening slate)
        if: github.event.schedule == '0 20 * * *'
        env:
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python engines/mlb_engine/utils/revalidate_site.py
